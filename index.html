<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar Detector de Quesos</title>

<style>

body{
    background:black;
    color:lime;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
}

h1{
    margin-top:15px;
}

#contenedor{
    display:flex;
    flex-direction:column;
    align-items:center;
}

canvas{
    border:3px solid lime;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

#detectados{
    margin-top:15px;
    font-size:18px;
    min-height:100px;
}

</style>
</head>

<body>

<h1>RADAR DETECTOR DE QUESOS</h1>

<div id="contenedor">

<canvas id="radar" width="500" height="500"></canvas>

<button onclick="iniciarEscaneo()">
INICIAR ESCANEO
</button>

<div id="detectados">
Esperando escaneo...
</div>

</div>

<audio id="bip">
    <source src="sonidos/bip.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

const centroX = 250;
const centroY = 250;
const radioRadar = 200;

let angulo = 0;

let objetivos = [];

const quesos = [

{
nombre:"Manchego",
archivo:"imagenes/manchego.png"
},

{
nombre:"Brie",
archivo:"imagenes/brie.png"
},

{
nombre:"Gouda",
archivo:"imagenes/gouda.png"
},

{
nombre:"Roquefort",
archivo:"imagenes/roquefort.png"
},

{
nombre:"Camembert",
archivo:"imagenes/camembert.png"
},

{
nombre:"Cabrales",
archivo:"imagenes/cabrales.png"
}

];

function crearObjetivos(){

    objetivos = [];

    document.getElementById("detectados").innerHTML =
    "Escaneando...";

    const cantidad =
    Math.floor(Math.random()*3)+3;

    const usados = [];

    for(let i=0;i<cantidad;i++){

        let queso;

        do{

            queso =
            quesos[Math.floor(Math.random()*quesos.length)];

        }while(usados.includes(queso.nombre));

        usados.push(queso.nombre);

        const img = new Image();
        img.src = queso.archivo;

        let distancia =
        Math.random()*140+20;

        let ang =
        Math.random()*Math.PI*2;

        objetivos.push({

            nombre: queso.nombre,

            imagen: img,

            x:
            centroX +
            Math.cos(ang)*distancia,

            y:
            centroY +
            Math.sin(ang)*distancia,

            detectado:false,

            angulo:
            (Math.atan2(
                centroY +
                Math.sin(ang)*distancia - centroY,
                centroX +
                Math.cos(ang)*distancia - centroX
            ) + Math.PI*2)
            %(Math.PI*2)

        });

    }

}

function iniciarEscaneo(){

    crearObjetivos();

    let audio =
    document.getElementById("bip");

    audio.loop = true;

    audio.play();

}

function dibujarRadar(){

    ctx.clearRect(0,0,500,500);

    ctx.strokeStyle="lime";
    ctx.lineWidth=2;

    // marco cuadrado

    ctx.strokeRect(50,50,400,400);

    // círculos internos

    ctx.beginPath();
    ctx.arc(250,250,160,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(250,250,110,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(250,250,60,0,Math.PI*2);
    ctx.stroke();

    // líneas cardinales

    ctx.beginPath();
    ctx.moveTo(250,50);
    ctx.lineTo(250,450);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(50,250);
    ctx.lineTo(450,250);
    ctx.stroke();

    // barrido

    let barridoX =
    centroX +
    Math.cos(angulo)*radioRadar;

    let barridoY =
    centroY +
    Math.sin(angulo)*radioRadar;

    ctx.beginPath();
    ctx.moveTo(centroX,centroY);
    ctx.lineTo(barridoX,barridoY);

    ctx.strokeStyle="lime";
    ctx.lineWidth=4;
    ctx.stroke();

    // objetivos

    for(let obj of objetivos){

        if(!obj.detectado){

            ctx.fillStyle="lime";

            ctx.beginPath();
            ctx.arc(
                obj.x,
                obj.y,
                4,
                0,
                Math.PI*2
            );

            ctx.fill();

            let diferencia =
            Math.abs(obj.angulo-angulo);

            if(
    diferencia < 0.03 ||
    diferencia > (Math.PI*2)-0.03
){

    obj.detectado = true;

    actualizarLista();
}

        }else{

            ctx.drawImage(
                obj.imagen,
                obj.x-25,
                obj.y-25,
                50,
                50
            );

        }

    }

    angulo += 0.02;

    if(angulo > Math.PI*2){

        angulo = 0;

    }

    requestAnimationFrame(
        dibujarRadar
    );

}

function actualizarLista(){

    let html =
    "<b>OBJETIVOS DETECTADOS</b><br><br>";

    for(let obj of objetivos){

        if(obj.detectado){

            html +=
            "🧀 " +
            obj.nombre +
            "<br>";

        }

    }

    document.getElementById(
        "detectados"
    ).innerHTML = html;

}

dibujarRadar();

</script>

</body>
</html>
